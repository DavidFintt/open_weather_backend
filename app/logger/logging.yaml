version: 1
disable_existing_loggers: false

formatters:
  padrao:
    format: "%(asctime)s %(levelname)s %(name)s %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: padrao
    stream: "ext://sys.stdout"
  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: padrao
    filename: "logs/app.log"
    encoding: "utf-8"

loggers:
  openweather:
    level: DEBUG
    handlers: ["console", "file"]
    propagate: false

root:
  level: WARNING
  handlers: ["console"]
